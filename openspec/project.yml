# ralphy-sdd Project Configuration
# Generated by: ralphy-sdd init
# Version: 2.1 (Budget Intelligence + Sprint Semantics)

version: "1.1"

project:
  name: "ralphy-sdd"
  repoRoot: "."
  language: "ts"
  packageManager: "npm"          # user-defined: npm | pnpm | yarn | bun

defaults:
  backend: "opencode"
  workspaceMode: "patch"       # "worktree" | "patch"
  checkpointMode: "commit"     # "commit" | "patch"
  validators:
    - typecheck
    - test
    - lint

# Policies (heuristics; configurable)
policies:
  scopeGuard: "warn"           # off | warn | block

# Artifacts (IDE-friendly human interface)
# NOTE: These are defaults; users can override or disable.
artifacts:
  enabled: true
  rootDir: "ralphy-sdd"        # default; can be overridden via CLI: --artifact-dir
  statusIcons: "emoji"          # "emoji" | "ascii" | "none"

# Run-level budgets (hard limits for entire run)
budgets:
  run:
    money_usd: 20              # Max USD per run
    tokens: 2000000            # Max tokens per run
    wall_time_minutes: 90      # Max wall clock time
    max_iterations_total: 80   # Max total iterations across all tasks
  
  limits:
    max_parallel_tasks: 1      # Concurrent tasks (v1: always 1)
    max_parallel_validators: 2 # Concurrent validators
    command_timeout_seconds: 900

# Sprint size defaults (applied when task has sprint.size but no explicit budget)
# Users can override per-task
sprint_defaults:
  XS:
    optimal: { usd: 0.20, tokens: 15000, time_minutes: 3 }
    warning: { usd: 0.35, tokens: 25000, time_minutes: 5 }
    hard: { usd: 0.50, tokens: 40000, time_minutes: 8, max_iterations: 3 }
  S:
    optimal: { usd: 0.50, tokens: 40000, time_minutes: 5 }
    warning: { usd: 0.80, tokens: 65000, time_minutes: 8 }
    hard: { usd: 1.20, tokens: 100000, time_minutes: 12, max_iterations: 5 }
  M:
    optimal: { usd: 1.20, tokens: 80000, time_minutes: 10 }
    warning: { usd: 2.00, tokens: 150000, time_minutes: 15 }
    hard: { usd: 3.00, tokens: 250000, time_minutes: 20, max_iterations: 8 }
  L:
    optimal: { usd: 2.50, tokens: 150000, time_minutes: 20 }
    warning: { usd: 4.00, tokens: 280000, time_minutes: 35 }
    hard: { usd: 6.00, tokens: 450000, time_minutes: 50, max_iterations: 12 }
  XL:
    optimal: { usd: 5.00, tokens: 300000, time_minutes: 40 }
    warning: { usd: 8.00, tokens: 550000, time_minutes: 70 }
    hard: { usd: 12.00, tokens: 900000, time_minutes: 100, max_iterations: 20 }

backends:
  opencode:
    command: "opencode"
    modelTiers:
      default: {}
      cheap: {}
  claude_code:
    command: "claude"
    modelTiers:
      default: {}
  codex:
    command: "codex"
    modelTiers:
      default: {}

validators:
  - id: "typecheck"
    # Avoid hard-coding package manager. Choose commands that match your repo.
    run: "npm run typecheck"
    timeout_seconds: 600
    parser: "tsc"
  - id: "test"
    run: "npm test"
    timeout_seconds: 900
    parser: "jest"
  - id: "lint"
    run: "npm run lint"
    timeout_seconds: 600
    parser: "eslint"
  - id: "failfast"
    run: "node -e \"process.exit(1)\""
    timeout_seconds: 5
    parser: "jest"

# Tasks - define your implementation tasks here
# Active change: add-cli-plan-command
tasks:
  # 1. CLI Surface + Parsing
  - id: "plan-1.1"
    title: "Add ralphy-sdd plan command entrypoint"
    goal: |
      Create src/cli/plan.ts with command registration and flag parsing.
      Support: ralphy-sdd plan "prompt text" OR ralphy-sdd plan prd.md (file path if exists).
      Flags: --dir, --backend, --artifact-dir, --ref (repeatable), --change, --json.
      Register in src/index.ts following the same pattern as run/init/validate.
    validators: ["typecheck"]
    sprint:
      size: M
      intent: "feature"
    budget:
      optimal: { usd: 1.2, tokens: 80000, time_minutes: 10 }
      warning: { usd: 2.0, tokens: 150000, time_minutes: 15 }
      hard: { usd: 3.0, tokens: 250000, time_minutes: 20, max_iterations: 8 }
    files_contract:
      allowed: ["src/cli/plan.ts", "src/index.ts"]
      forbidden: ["src/core/engine/**"]
    acceptance:
      - id: "acc-1"
        text: "ralphy-sdd plan 'hello' accepts input as prompt string"
        type: "behavior"
      - id: "acc-2"
        text: "ralphy-sdd plan prd.md reads file contents as planning input"
        type: "behavior"
      - id: "acc-3"
        text: "All flags are registered and parsed without errors"
        type: "behavior"

  # 2. Reference Resolution + Context Pack
  - id: "plan-2.1"
    title: "Implement --ref resolution with glob expansion"
    goal: |
      Create src/cli/plan/refs.ts (or inline in plan.ts): resolve --ref patterns relative to repo root
      using fast-glob. Deduplicate paths, stable-sort lexicographically. Hard cap total ref files (20)
      and bytes (512KB). Glob matching zero files → error (exit code 4).
    deps: ["plan-1.1"]
    validators: ["typecheck", "test"]
    sprint:
      size: S
      intent: "feature"
    budget:
      optimal: { usd: 0.5, tokens: 40000, time_minutes: 5 }
      warning: { usd: 0.8, tokens: 65000, time_minutes: 8 }
      hard: { usd: 1.2, tokens: 100000, time_minutes: 12, max_iterations: 5 }
    files_contract:
      allowed: ["src/cli/plan.ts", "src/cli/plan/**"]
      forbidden: ["src/core/engine/**"]
    acceptance:
      - id: "acc-1"
        text: "--ref docs/*.md expands and includes all matched files"
        type: "behavior"
      - id: "acc-2"
        text: "Missing ref glob → exit code 4 with clear error"
        type: "behavior"

  - id: "plan-2.2"
    title: "Build Planning Context Pack"
    goal: |
      Create src/core/planning/context-pack.ts: build a deterministic, bounded text context pack
      including user input, ref contents, openspec/project.md, existing specs summaries, and strict
      PLAN MODE constraints. Prefer installed planning templates (Codex/Claude/OpenCode), with
      built-in fallback. Context must be deterministic for same inputs.
    deps: ["plan-2.1"]
    validators: ["typecheck", "test"]
    sprint:
      size: M
      intent: "feature"
    budget:
      optimal: { usd: 1.2, tokens: 80000, time_minutes: 10 }
      warning: { usd: 2.0, tokens: 150000, time_minutes: 15 }
      hard: { usd: 3.0, tokens: 250000, time_minutes: 20, max_iterations: 8 }
    files_contract:
      allowed: ["src/core/planning/**", "src/cli/plan.ts"]
      forbidden: ["src/core/engine/**"]
    acceptance:
      - id: "acc-1"
        text: "Context pack includes user input, refs, project.md, and PLAN MODE constraints"
        type: "behavior"
      - id: "acc-2"
        text: "Same inputs produce identical context pack text"
        type: "behavior"

  # 3. Change ID Derivation
  - id: "plan-3.1"
    title: "Derive changeId when --change is not provided"
    goal: |
      Create src/core/planning/change-id.ts: derive kebab-case slug from input text (max 50 chars).
      Add short suffix if collision with existing non-empty change folder. Must be stable for identical
      inputs. Export deriveChangeId(input, existingChanges) → string.
    deps: ["plan-1.1"]
    validators: ["typecheck", "test"]
    sprint:
      size: S
      intent: "feature"
    budget:
      optimal: { usd: 0.5, tokens: 40000, time_minutes: 5 }
      warning: { usd: 0.8, tokens: 65000, time_minutes: 8 }
      hard: { usd: 1.2, tokens: 100000, time_minutes: 12, max_iterations: 5 }
    files_contract:
      allowed: ["src/core/planning/**"]
      forbidden: ["src/core/engine/**", "src/cli/**"]
    acceptance:
      - id: "acc-1"
        text: "Derived changeId is stable for identical inputs"
        type: "behavior"
      - id: "acc-2"
        text: "Collision with existing folder → different id with suffix"
        type: "behavior"

  # 4. Backend Invocation
  - id: "plan-4.1"
    title: "Invoke backend for planning"
    goal: |
      In src/cli/plan.ts: reuse existing backend adapter selection logic (same as run).
      Build planning prompt from context pack + PLAN MODE constraint. Invoke backend once.
      Enforce scope guard: detect and fail if non-OpenSpec paths are modified (policy: block).
    deps: ["plan-2.2", "plan-3.1"]
    validators: ["typecheck"]
    sprint:
      size: M
      intent: "feature"
    budget:
      optimal: { usd: 1.2, tokens: 80000, time_minutes: 10 }
      warning: { usd: 2.0, tokens: 150000, time_minutes: 15 }
      hard: { usd: 3.0, tokens: 250000, time_minutes: 20, max_iterations: 8 }
    files_contract:
      allowed: ["src/cli/plan.ts", "src/core/planning/**"]
      forbidden: ["src/core/engine/loop.ts"]
    acceptance:
      - id: "acc-1"
        text: "Backend receives PLAN MODE instruction payload"
        type: "behavior"
      - id: "acc-2"
        text: "--backend noop runs without external tool dependency"
        type: "behavior"

  # 5. File Outputs + Structural Enforcement
  - id: "plan-5.1"
    title: "Write OpenSpec change folder and update project files"
    goal: |
      After backend completes: verify and write expected outputs:
      openspec/changes/<changeId>/proposal.md, tasks.md, specs/** (at least one).
      Update openspec/project.yml with planned tasks. Create openspec/project.md if missing.
      Task ID collision → fail deterministically (exit code 4).
    deps: ["plan-4.1"]
    validators: ["typecheck"]
    sprint:
      size: M
      intent: "feature"
    budget:
      optimal: { usd: 1.2, tokens: 80000, time_minutes: 10 }
      warning: { usd: 2.0, tokens: 150000, time_minutes: 15 }
      hard: { usd: 3.0, tokens: 250000, time_minutes: 20, max_iterations: 8 }
    files_contract:
      allowed: ["src/cli/plan.ts", "src/core/planning/**"]
      forbidden: ["src/core/engine/**"]
    acceptance:
      - id: "acc-1"
        text: "Change folder created with proposal.md, tasks.md, and at least one spec delta"
        type: "behavior"
      - id: "acc-2"
        text: "SpecLoader.loadProjectSpec() succeeds after plan writes"
        type: "behavior"

  - id: "plan-5.2"
    title: "Enforce plan output quality gates"
    goal: |
      Create src/core/planning/quality-gates.ts: validate planned tasks have sprint.size,
      sprint.intent, validators (referencing declared), files_contract.allowed (non-empty),
      and acceptance (non-empty). Fail with exit code 4 and report which tasks violate.
    deps: ["plan-5.1"]
    validators: ["typecheck", "test"]
    sprint:
      size: S
      intent: "feature"
    budget:
      optimal: { usd: 0.5, tokens: 40000, time_minutes: 5 }
      warning: { usd: 0.8, tokens: 65000, time_minutes: 8 }
      hard: { usd: 1.2, tokens: 100000, time_minutes: 12, max_iterations: 5 }
    files_contract:
      allowed: ["src/core/planning/**"]
      forbidden: ["src/core/engine/**"]
    acceptance:
      - id: "acc-1"
        text: "Tasks missing sprint.size → deterministic failure with exit code 4"
        type: "behavior"
      - id: "acc-2"
        text: "Validator references checked against declared validators"
        type: "behavior"

  # 6. Post-Plan Validation + Artifacts
  - id: "plan-6.1"
    title: "Run schema-level post-plan validation"
    goal: |
      After plan writes: run SpecLoader.loadProjectSpec() + buildTaskDAG() + scaffold checks.
      Invalid YAML or schema → exit non-zero with error report.
    deps: ["plan-5.2"]
    validators: ["typecheck"]
    sprint:
      size: S
      intent: "feature"
    budget:
      optimal: { usd: 0.5, tokens: 40000, time_minutes: 5 }
      warning: { usd: 0.8, tokens: 65000, time_minutes: 8 }
      hard: { usd: 1.2, tokens: 100000, time_minutes: 12, max_iterations: 5 }
    files_contract:
      allowed: ["src/cli/plan.ts", "src/core/planning/**"]
      forbidden: ["src/core/engine/**"]
    acceptance:
      - id: "acc-1"
        text: "Invalid YAML causes non-zero exit with error report"
        type: "behavior"

  - id: "plan-6.2"
    title: "Write PLAN completion artifacts"
    goal: |
      Write ralphy-sdd/STATUS.md with phase "PLAN completed", change id, output file pointers.
      Write ralphy-sdd/runs/<runId>.md with input summary, refs, change id, validation results.
      Reuse existing artifact writers (writeStatus, writeRunLogOnce).
    deps: ["plan-6.1"]
    validators: ["typecheck"]
    sprint:
      size: S
      intent: "feature"
    budget:
      optimal: { usd: 0.5, tokens: 40000, time_minutes: 5 }
      warning: { usd: 0.8, tokens: 65000, time_minutes: 8 }
      hard: { usd: 1.2, tokens: 100000, time_minutes: 12, max_iterations: 5 }
    files_contract:
      allowed: ["src/cli/plan.ts", "src/core/planning/**"]
      forbidden: ["src/core/engine/**"]
    acceptance:
      - id: "acc-1"
        text: "STATUS.md shows phase PLAN and PLAN completed message"
        type: "behavior"
      - id: "acc-2"
        text: "Run log exists for the plan runId"
        type: "behavior"

  # 7. JSON Output + Exit Codes
  - id: "plan-7.1"
    title: "Implement --json output contract"
    goal: |
      When --json is passed: success → { ok, changeId, runId, writtenFiles, validation, warnings }.
      Failure → { ok: false, exitCode, error }. Exit codes: 0=success, 4=invalid, 5=backend error, 6=IO error.
    deps: ["plan-6.2"]
    validators: ["typecheck", "test"]
    sprint:
      size: S
      intent: "feature"
    budget:
      optimal: { usd: 0.5, tokens: 40000, time_minutes: 5 }
      warning: { usd: 0.8, tokens: 65000, time_minutes: 8 }
      hard: { usd: 1.2, tokens: 100000, time_minutes: 12, max_iterations: 5 }
    files_contract:
      allowed: ["src/cli/plan.ts", "src/core/planning/**"]
      forbidden: ["src/core/engine/**"]
    acceptance:
      - id: "acc-1"
        text: "--json outputs valid JSON with required fields on success"
        type: "behavior"
      - id: "acc-2"
        text: "--json outputs valid JSON with error info on failure"
        type: "behavior"

  # 8. Release Hygiene
  - id: "plan-8.1"
    title: "Update CLI docs and bump version to v0.4.0"
    goal: |
      Update package.json version to 0.4.0, update src/index.ts version string,
      ensure ralphy-sdd --help lists plan command. Update README if needed.
    deps: ["plan-7.1"]
    validators: ["typecheck", "test"]
    sprint:
      size: XS
      intent: "infra"
    files_contract:
      allowed: ["package.json", "src/index.ts", "README.md", "CHANGELOG.md"]
      forbidden: ["src/core/engine/**"]
    acceptance:
      - id: "acc-1"
        text: "ralphy-sdd --help lists plan command"
        type: "behavior"
      - id: "acc-2"
        text: "npm run typecheck && npm test pass"
        type: "evidence"

